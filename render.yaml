services:
  - type: web
    name: food-rescue-network
    runtime: node
    rootDir: food-rescue-network
    buildCommand: npm --prefix backend ci && npm --prefix frontend ci && npm --prefix frontend run build
    startCommand: npm --prefix backend start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
